<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>

<body>
    <h1>Formularios</h1>
    <form action="/procesar" method="post">
        <table>
            <tr>
                <td>
                    <label for="Nombre">Nombre</label><br>
                    <input type="text" id="nombre" name="nombre">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="email">Correo Electrónico
                        <input type="email" id="email" name="email">
                    </label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="password">Contraseña</label><br>
                    <input type="password" id="password" name="password">
                </td>
                <td>
                    <label for="url">Sitio Web</label><br>
                    <input type="url" id="url" name="url">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="telefono">Telefono</label><br>
                    <input type="tel" id="telefono" name="telefono">
                </td>
                <td>
                    <label for="url">Sitio Web</label><br>
                    <input type="url" id="url" name="url">
                </td>
            </tr>
            <!-- Tipos Numéricios -->
            <tr>
                <td>
                    <label for="edad">Edad</label><br>
                    <input type="number" id="edad" name="edad" min="0" max="120" step="1">
                </td>
                <td>
                    <label for="volumen">Volumen<span id="val-vol">50</span></label><br>
                    <input type="range" id="volumen" name="volumen" min="0" max="120" value=50
                        oninput="document.getElementByID('val-vol').textContent=this.value">
                </td>
            </tr>
            <!-- Tipos Fechas -->
            <tr>
                <td colspan="2">
                    <h3>Tipos de Fecha</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="fecha">Fecha de Nacimiento</label><br>
                    <input type="date" id="fecha" name="fecha">
                </td>
                <td>
                    <label for="hora">Hora de la cita</label><br>
                    <input type="time" id="hora" name="hora">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="evento">Inicio del Evento</label><br>
                    <input type="datetime-local" id="evento" name="evento">
                </td>
                <td>
                    <label for="mes">Mes de Inicio</label><br>
                    <input type="month" id="mes" name="mes">
                </td>
            </tr>
            <!-- Checkbox y Option -->
            <tr>
                <td colspan="2">
                    <h3>Checkbox y Option</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="checkbox" id="acepto" name="acepto" value="si">
                    <label for="acepto">Acepto los términos y condiciones</label><br>
                </td>
                <td>
                    <fieldset>
                        <legend>
                            Método de Pago
                        </legend>
                        <input type="radio" id="tarjeta" name="pago" value="tarjeta">
                        <label for="tarjeta">Tarjeta de Crédito</label>
                        <input type="radio" id="paypal" name="pago" value="paypal">
                        <label for="paypal">Paypal</label>
                        <input type="radio" id="transferencia" name="pago" value="transferencia">
                        <label for="transferencia">Transferencia Bancaria</label>
                    </fieldset>
                </td>
            </tr>
            <!-- Utiles -->
            <tr>
                <td colspan="2">
                    <h3>Utiles</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="color">Color</label>
                    <input type="color" id="color" name="color" value="#3b82f6"><br>
                </td>
                <td>
                    <label for="foto">Foto de perfil:</label>
                    <input type="file" id="foto" name="foto" value="image/"><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="docs">Documentos</label>
                    <input type="file" id="docs" name="documentos" accept=".pdf,.doc,.docx"><br>
                </td>
                <td>
                    <input type="hidden" id="token" name="token" value="abcd123xyz">
                </td>

            </tr>
            <!-- TextArea y Select -->
            <tr>
                <td colspan="2">
                    <h3>TextArea y Select</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="6" cols="50"
                        placeholder="Escribe tu mensaje aqui"></textarea>
                </td>
                <td>
                    <!-- Select Básico -->
                    <label for="pais">País</label><br>
                    <select id="pais" name="pais">
                        <option value="">-- Seleccione un País --</option>
                        <option value="co">Colombia</option>
                        <option value="ec">Ecuador</option>
                        <option value="es">España</option>
                        <option value="ve">Venezuela</option>
                    </select>
                </td>
            </tr>
            <td>
                <!-- Select con optgrop -->
                <label for="ciudad">Ciudades</label><br>
                <select id="ciudad" name="ciudad">
                    <optgroup label="España">
                        <option value="mad">Madrid</option>
                        <option value="bc">Barcelona</option>
                        <option value="sev">Sevilla</option>
                    </optgroup>
                    <optgroup label="Mexico">
                        <option value="mx">Ciudad de Mexico</option>
                        <option value="gdl">Guadalajara</option>
                    </optgroup>
                    <optgroup label="Venezuela">
                        <option value="cor">Coro</option>
                        <option value="mar">Maracaibo</option>
                    </optgroup>
                </select>
            </td>
            <td>
                <!-- Selección Múltiple -->
                <label for="skill">Habilidades</label><br>
                <select id="skill" name="habilidades[]" multiple size="4">
                    <option value="html5">HTML5</option>
                    <option value="ccs3">CSS3</option>
                    <option value="js">Javascript</option>
                    <option value="ts">Typescript</option>
                </select>
            </td>
            </tr>
        </table>

        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
        <button type="button">Aceptar</button>

    </form>
</body>

</html>
